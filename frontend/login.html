<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar - training.infinity.dev</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <nav class="nav">
        <a class="logo" href="/">training.infinity.dev</a>
        <a class="button secondary" href="/register">Cadastrar</a>
      </nav>

      <section class="section">
        <div class="card" style="max-width: 420px; margin: 0 auto;">
          <h2>Entrar</h2>
          <p class="notice">Use email ou username.</p>
          <form class="form" id="loginForm">
            <input class="input" type="text" name="identifier" placeholder="Email ou username" required />
            <input class="input" type="password" name="password" placeholder="Senha" required />
            <button class="button" type="submit">Entrar</button>
          </form>
          <p style="margin-top: 12px;">
            <a class="notice" href="/recover">Esqueci minha senha</a>
          </p>
          <p id="loginError" class="notice error" style="display: none; margin-top: 12px;"></p>
        </div>
      </section>
    </div>
    <div id="introOverlay" class="intro-overlay is-hidden" aria-hidden="true">
      <div class="intro-content">
        <video id="introVideo" class="intro-video" autoplay muted playsinline>
          <source src="/assets/video/intro.mp4" type="video/mp4" />
        </video>
        <div class="intro-caption">
          <strong>training.infinity.dev</strong>
          <span>Entrando no mundo de desafios</span>
        </div>
      </div>
    </div>
    <script type="module" src="/assets/login.js"></script>
  </body>
</html>
