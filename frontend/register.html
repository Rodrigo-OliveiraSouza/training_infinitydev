<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar - training.infinity.dev</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="page">
      <nav class="nav">
        <a class="logo" href="/">training.infinity.dev</a>
        <a class="button secondary" href="/login">Entrar</a>
      </nav>

      <section class="section">
        <div class="card" style="max-width: 420px; margin: 0 auto;">
          <h2>Criar conta</h2>
          <form class="form" id="registerForm">
            <input class="input" type="text" name="username" placeholder="Username" required />
            <input class="input" type="email" name="email" placeholder="Email" required />
            <input class="input" type="password" name="password" placeholder="Senha" required />
            <input class="input" type="text" name="classCode" placeholder="Codigo da turma (opcional)" />
            <select class="input" name="role">
              <option value="user" selected>Sou aluno</option>
              <option value="teacher">Sou professor</option>
            </select>
            <button class="button" type="submit">Cadastrar</button>
          </form>
          <p id="registerError" class="notice error" style="display: none; margin-top: 12px;"></p>
        </div>
      </section>
    </div>
    <script type="module" src="/assets/register.js"></script>
  </body>
</html>
